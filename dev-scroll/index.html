<title>Скролл колеса — 5 вариантов · EGOE</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;background:#0b0e12;color:#e9ecef;font-family:'PT Sans',system-ui,sans-serif;overflow-x:hidden}
#stageHost{position:relative}
/* top switcher bar */
.sv-bar{position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;align-items:center;gap:12px;
  padding:8px 14px;background:linear-gradient(#0b0e12f2,#0b0e12cc);backdrop-filter:blur(10px);
  border-bottom:1px solid #1c2128}
.sv-bar .brand{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.16em;font-size:11px;color:#f26f1d;white-space:nowrap;flex:none}
.sv-btns{display:flex;gap:3px;margin-left:auto;overflow:auto;scrollbar-width:none;padding:2px;background:#12161c;border:1px solid #2a2f38;border-radius:999px;flex:none;max-width:100%}
.sv-btns::-webkit-scrollbar{display:none}
.sv-btns button{-webkit-appearance:none;appearance:none;border:0;background:transparent;cursor:pointer;
  font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.03em;font-size:12px;color:#9aa2ab;
  padding:8px 14px;border-radius:999px;white-space:nowrap;transition:.2s}
.sv-btns button:hover{color:#fff}
.sv-btns button.on{color:#fff;background:#f26f1d}
/* bottom-left info chip (out of the way of variant HUDs) */
.sv-info{position:fixed;left:14px;bottom:14px;z-index:9998;max-width:min(420px,72vw);
  background:#12161ccc;backdrop-filter:blur(10px);border:1px solid #2a2f38;border-radius:12px;padding:11px 14px;
  pointer-events:none}
.sv-info b{display:block;font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:.02em;color:#fff;margin-bottom:3px}
.sv-info span{display:block;font-size:12.5px;color:#9aa2ab;line-height:1.45}
.sv-info em{display:block;margin-top:6px;font-style:normal;font-size:11.5px;color:#6c757d}
@media(max-width:640px){.sv-info{max-width:calc(100vw - 28px)}.sv-info em{display:none}}
.sv-hint{position:fixed;bottom:16px;right:16px;z-index:9997;font-size:11px;color:#5b626c;
  font-family:'Oswald',sans-serif;letter-spacing:.16em;text-transform:uppercase;pointer-events:none;animation:svh 2.6s ease-in-out infinite}
@keyframes svh{0%,100%{opacity:.35}50%{opacity:.85}}
</style>
</head>
<body>
<div class="sv-bar"><span class="brand">EGOE · скролл колеса</span><div class="sv-btns" id="svBtns"><button data-v="v1">Снап-секции</button><button data-v="v2">Инерционный скролл</button><button data-v="v3">Кликер-степпер</button><button data-v="v4">Горизонтальный свайп</button><button data-v="v5">Закреплённый скраб</button></div></div>

<script>
var VARIANTS={"v1": {"label": "Снап-секции", "blurb": "Ставит каждый шаг ровно по центру экрана — листаешь как ленту, и раздел сам щёлкает на место.", "mobileNote": "На тач-скрине это обычный вертикальный свайп с родной инерцией — палец отпускаешь, и шаг мягко доводится до края, страница нигде не залипает.", "css": ".stage[data-variant=\"v1\"]{\n  position:relative;\n  height:100svh;\n  min-height:520px;\n  overflow-y:auto;\n  overflow-x:hidden;\n  scroll-snap-type:y mandatory;\n  -webkit-overflow-scrolling:touch;\n  scroll-behavior:smooth;\n  scrollbar-width:none;\n  background:\n    radial-gradient(120% 80% at 82% -10%, rgba(242,111,29,.10), transparent 55%),\n    #0b0e12;\n  color:#e9ecef;\n  font-family:'PT Sans',system-ui,sans-serif;\n  overscroll-behavior-y:contain;\n}\n.stage[data-variant=\"v1\"]::-webkit-scrollbar{width:0;height:0;display:none;}\n\n.stage[data-variant=\"v1\"] .track{display:block;}\n\n.stage[data-variant=\"v1\"] .panel{\n  position:relative;\n  min-height:100%;\n  box-sizing:border-box;\n  scroll-snap-align:start;\n  scroll-snap-stop:always;\n  display:flex;\n  align-items:center;\n  justify-content:flex-start;\n  padding:clamp(28px,7vw,120px);\n  padding-right:clamp(72px,10vw,180px);\n  overflow:hidden;\n}\n\n.stage[data-variant=\"v1\"] .panel::before{\n  content:\"\";\n  position:absolute;\n  left:0;top:50%;\n  width:0;height:0;\n  transform:translateY(-50%);\n  border-left:3px solid #f26f1d;\n  opacity:0;\n  transition:height .55s cubic-bezier(.16,1,.3,1),opacity .45s ease;\n}\n.stage[data-variant=\"v1\"] .panel.is-active::before{\n  height:46%;\n  opacity:.9;\n}\n\n.stage[data-variant=\"v1\"] .panel::after{\n  content:attr(data-i);\n  position:absolute;\n  right:clamp(40px,7vw,120px);\n  bottom:clamp(18px,5vh,60px);\n  font-family:'Oswald',sans-serif;\n  font-weight:700;\n  font-size:clamp(120px,26vw,340px);\n  line-height:.8;\n  color:#fff;\n  opacity:.028;\n  letter-spacing:-.04em;\n  pointer-events:none;\n  user-select:none;\n  z-index:0;\n}\n\n.stage[data-variant=\"v1\"] .pin{\n  position:relative;\n  z-index:1;\n  max-width:min(640px,84%);\n  transform:translateY(22px);\n  opacity:.32;\n  filter:blur(.4px);\n  transition:transform .7s cubic-bezier(.16,1,.3,1),opacity .6s ease,filter .6s ease;\n}\n.stage[data-variant=\"v1\"] .panel.is-active .pin{\n  transform:translateY(0);\n  opacity:1;\n  filter:none;\n}\n\n.stage[data-variant=\"v1\"] .pk{\n  display:inline-flex;\n  align-items:center;\n  gap:.55em;\n  font-family:'Oswald',sans-serif;\n  font-weight:600;\n  font-size:clamp(13px,1.5vw,16px);\n  letter-spacing:.42em;\n  text-transform:uppercase;\n  color:#9aa2ab;\n  margin:0 0 clamp(16px,2.4vh,26px);\n  transition:color .5s ease;\n}\n.stage[data-variant=\"v1\"] .pk::before{\n  content:\"\";\n  width:clamp(22px,3vw,40px);\n  height:1px;\n  background:#9aa2ab;\n  transition:background .5s ease,width .5s cubic-bezier(.16,1,.3,1);\n}\n.stage[data-variant=\"v1\"] .panel.is-active .pk{color:#f26f1d;}\n.stage[data-variant=\"v1\"] .panel.is-active .pk::before{\n  background:#f26f1d;\n  width:clamp(38px,5vw,64px);\n}\n\n.stage[data-variant=\"v1\"] .pin h3{\n  font-family:'Oswald',sans-serif;\n  font-weight:600;\n  font-size:clamp(30px,6vw,64px);\n  line-height:1.02;\n  letter-spacing:-.01em;\n  margin:0 0 clamp(14px,2.2vh,24px);\n  color:#e9ecef;\n  text-wrap:balance;\n}\n.stage[data-variant=\"v1\"] .pin p{\n  font-size:clamp(16px,2.1vw,21px);\n  line-height:1.6;\n  color:#9aa2ab;\n  margin:0;\n  max-width:36ch;\n  text-wrap:pretty;\n}\n\n.stage[data-variant=\"v1\"] .hud{\n  position:absolute;\n  top:50%;\n  right:clamp(14px,2.4vw,34px);\n  transform:translateY(-50%);\n  z-index:5;\n  display:flex;\n  flex-direction:column;\n  align-items:center;\n  gap:clamp(12px,1.8vh,20px);\n  padding:14px 10px;\n}\n\n.stage[data-variant=\"v1\"] .hud .rail{\n  position:absolute;\n  top:14px;bottom:14px;\n  left:50%;\n  width:1px;\n  transform:translateX(-50%);\n  background:linear-gradient(#2a2f38,#2a2f38);\n  overflow:hidden;\n}\n.stage[data-variant=\"v1\"] .hud .rail i{\n  position:absolute;\n  left:0;top:0;\n  width:100%;\n  background:#f26f1d;\n  height:0;\n  transition:height .5s cubic-bezier(.16,1,.3,1);\n}\n\n.stage[data-variant=\"v1\"] .hud button{\n  position:relative;\n  z-index:1;\n  -webkit-appearance:none;appearance:none;\n  border:0;\n  background:transparent;\n  padding:6px;\n  margin:0;\n  cursor:pointer;\n  display:block;\n  line-height:0;\n  color:inherit;\n}\n.stage[data-variant=\"v1\"] .hud button .dot{\n  display:block;\n  width:8px;height:8px;\n  border-radius:50%;\n  background:#5b626c;\n  box-shadow:0 0 0 0 rgba(242,111,29,0);\n  transition:transform .45s cubic-bezier(.16,1,.3,1),\n             background .4s ease,\n             box-shadow .45s ease;\n}\n.stage[data-variant=\"v1\"] .hud button:hover .dot{\n  background:#9aa2ab;\n  transform:scale(1.3);\n}\n.stage[data-variant=\"v1\"] .hud button[aria-current=\"true\"] .dot{\n  background:#f26f1d;\n  transform:scale(2);\n  box-shadow:0 0 0 4px rgba(242,111,29,.14);\n}\n.stage[data-variant=\"v1\"] .hud button:focus-visible{\n  outline:2px solid #ff8a3d;\n  outline-offset:3px;\n  border-radius:50%;\n}\n\n.stage[data-variant=\"v1\"] .hud .count{\n  position:absolute;\n  bottom:-30px;\n  left:50%;\n  transform:translateX(-50%);\n  font-family:'Oswald',sans-serif;\n  font-weight:600;\n  font-size:12px;\n  letter-spacing:.14em;\n  color:#9aa2ab;\n  white-space:nowrap;\n}\n.stage[data-variant=\"v1\"] .hud .count b{color:#f26f1d;font-weight:600;}\n\n.stage[data-variant=\"v1\"] .cue{\n  position:absolute;\n  left:50%;\n  bottom:clamp(16px,3.5vh,40px);\n  transform:translateX(-50%);\n  z-index:4;\n  display:flex;\n  flex-direction:column;\n  align-items:center;\n  gap:6px;\n  font-family:'Oswald',sans-serif;\n  font-size:11px;\n  letter-spacing:.32em;\n  text-transform:uppercase;\n  color:#5b626c;\n  pointer-events:none;\n  transition:opacity .5s ease;\n}\n.stage[data-variant=\"v1\"] .cue span{\n  width:1px;height:22px;\n  background:linear-gradient(#5b626c,transparent);\n  animation:v1cue 1.9s ease-in-out infinite;\n}\n.stage[data-variant=\"v1\"].at-end .cue{opacity:0;}\n\n@keyframes v1cue{\n  0%,100%{transform:scaleY(.4);transform-origin:top;opacity:.4;}\n  50%{transform:scaleY(1);opacity:1;}\n}\n\n@media (max-width:560px){\n  .stage[data-variant=\"v1\"] .panel{\n    padding:clamp(24px,8vw,40px);\n    padding-right:56px;\n    align-items:flex-end;\n    padding-bottom:clamp(80px,16vh,120px);\n  }\n  .stage[data-variant=\"v1\"] .hud{right:8px;gap:14px;}\n  .stage[data-variant=\"v1\"] .hud .count{display:none;}\n  .stage[data-variant=\"v1\"] .pin p{max-width:none;}\n}\n\n@media (prefers-reduced-motion:reduce){\n  .stage[data-variant=\"v1\"]{scroll-behavior:auto;}\n  .stage[data-variant=\"v1\"] .panel::before,\n  .stage[data-variant=\"v1\"] .pin,\n  .stage[data-variant=\"v1\"] .pk,\n  .stage[data-variant=\"v1\"] .pk::before,\n  .stage[data-variant=\"v1\"] .hud button .dot,\n  .stage[data-variant=\"v1\"] .hud .rail i{transition:none;}\n  .stage[data-variant=\"v1\"] .pin{opacity:1;transform:none;filter:none;}\n  .stage[data-variant=\"v1\"] .cue span{animation:none;}\n}", "js": "function initv1(stage){\n  var track = stage.querySelector('.track');\n  var hud = stage.querySelector('.hud');\n  if(!track || !hud) return;\n\n  var panels = Array.prototype.slice.call(track.querySelectorAll('.panel'));\n  var n = panels.length;\n  if(!n) return;\n\n  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n  var active = 0;\n\n  hud.innerHTML = '';\n  var rail = document.createElement('div');\n  rail.className = 'rail';\n  var railFill = document.createElement('i');\n  rail.appendChild(railFill);\n  hud.appendChild(rail);\n\n  var buttons = panels.map(function(panel, i){\n    var b = document.createElement('button');\n    b.type = 'button';\n    var title = (panel.querySelector('h3') && panel.querySelector('h3').textContent) || ('Шаг ' + (i+1));\n    b.setAttribute('aria-label', 'Шаг ' + (i+1) + ': ' + title);\n    var dot = document.createElement('span');\n    dot.className = 'dot';\n    b.appendChild(dot);\n    b.addEventListener('click', function(){ goTo(i); });\n    hud.appendChild(b);\n    return b;\n  });\n\n  var count = document.createElement('div');\n  count.className = 'count';\n  hud.appendChild(count);\n\n  var cue = document.createElement('div');\n  cue.className = 'cue';\n  cue.innerHTML = '<span></span>Листайте';\n  cue.setAttribute('aria-hidden','true');\n  stage.appendChild(cue);\n\n  function setActive(i){\n    if(i === active) { syncCount(); return; }\n    active = i;\n    panels.forEach(function(p, k){ p.classList.toggle('is-active', k === i); });\n    buttons.forEach(function(b, k){\n      if(k === i) b.setAttribute('aria-current','true');\n      else b.removeAttribute('aria-current');\n    });\n    syncCount();\n  }\n\n  function syncCount(){\n    count.innerHTML = '<b>' + String(active+1).padStart(2,'0') + '</b> / ' + String(n).padStart(2,'0');\n    var frac = n > 1 ? active / (n - 1) : 0;\n    railFill.style.height = (frac * 100) + '%';\n    stage.classList.toggle('at-end', active >= n - 1);\n  }\n\n  function goTo(i){\n    i = Math.max(0, Math.min(n - 1, i));\n    var target = panels[i];\n    if(!target) return;\n    if(reduce){\n      stage.scrollTop = target.offsetTop;\n    } else {\n      target.scrollIntoView({ behavior:'smooth', block:'start' });\n    }\n    setActive(i);\n    var b = buttons[i];\n    if(b && document.activeElement && stage.contains(document.activeElement)) b.focus({preventScroll:true});\n  }\n\n  var io = null;\n  if('IntersectionObserver' in window){\n    var ratios = new Array(n).fill(0);\n    io = new IntersectionObserver(function(entries){\n      entries.forEach(function(e){\n        var idx = panels.indexOf(e.target);\n        if(idx > -1) ratios[idx] = e.isIntersecting ? e.intersectionRatio : 0;\n      });\n      var best = 0, bestR = -1;\n      for(var k = 0; k < n; k++){ if(ratios[k] > bestR){ bestR = ratios[k]; best = k; } }\n      setActive(best);\n    }, { root: stage, threshold:[0,.25,.5,.6,.75,1], rootMargin:'-8% 0px -8% 0px' });\n    panels.forEach(function(p){ io.observe(p); });\n  } else {\n    var onScroll = function(){\n      var mid = stage.scrollTop + stage.clientHeight / 2;\n      var best = 0;\n      for(var k = 0; k < n; k++){\n        if(panels[k].offsetTop <= mid) best = k;\n      }\n      setActive(best);\n    };\n    stage.addEventListener('scroll', onScroll, { passive:true });\n    onScroll();\n  }\n\n  stage.addEventListener('keydown', function(e){\n    var k = e.key;\n    if(k === 'ArrowDown' || k === 'PageDown'){ e.preventDefault(); goTo(active + 1); }\n    else if(k === 'ArrowUp' || k === 'PageUp'){ e.preventDefault(); goTo(active - 1); }\n    else if(k === 'Home'){ e.preventDefault(); goTo(0); }\n    else if(k === 'End'){ e.preventDefault(); goTo(n - 1); }\n  });\n\n  if(!stage.hasAttribute('tabindex')) stage.setAttribute('tabindex','0');\n  stage.setAttribute('role','group');\n  stage.setAttribute('aria-roledescription','карусель шагов');\n\n  setActive(0);\n  syncCount();\n}"}, "v2": {"label": "Инерционный скролл", "blurb": "Ощущается как тяжёлый, но плавный «масляный» скролл с мягким притяжением к панели — когда хочется премиального, дорогого движения без резких щелчков.", "mobileNote": "На тач-экране жест ведёт трек напрямую с инерцией и мягко доводит до ближайшей панели; у верхнего и нижнего края управление отдаётся странице, так что палец никогда не залипает.", "css": ".stage[data-variant=\"v2\"]{\n  position:relative;\n  height:100svh;\n  min-height:520px;\n  overflow:hidden;\n  background:#0b0e12;\n  color:#e9ecef;\n  font-family:'PT Sans',system-ui,sans-serif;\n  isolation:isolate;\n  touch-action:pan-y;\n  -webkit-tap-highlight-color:transparent;\n}\n.stage[data-variant=\"v2\"]::before{\n  content:\"\";\n  position:absolute;\n  inset:0;\n  background:\n    radial-gradient(120%
